nameOverride: ""
fullnameOverride: ""

clients:
  admin:
    secret: "**********"
  gate:
    secret: "**********"
  pool:
    secret: "**********"
  orchestrator:
    secret: "**********"
  cleaningDummy:
    secret: "**********"
  gateInputConsumer:
    secret: "**********"
  gateInputManager:
    secret: "**********"
  gateOutputConsumer:
    secret: "**********"
  participant:
    secret: "**********"
  sharingMember:
    secret: "**********"
  taskCreator:
    secret: "**********"
  refinerClean:
    secret: "**********"
  refinerCleanAndSync:
    secret: "**********"
  refinerPoolSync:
    secret: "**********"

bpdm-gate:
  enabled: true
  externalApplicationConfig:
    - name: bpdm-postgres-connection-config
    - name: bpdm-keycloak-connection-config

bpdm-pool:
  enabled: true
  externalApplicationConfig:
    - name: bpdm-postgres-connection-config
    - name: bpdm-keycloak-connection-config

bpdm-cleaning-service-dummy:
  enabled: true
  externalApplicationConfig:
    - name: bpdm-keycloak-connection-config

bpdm-orchestrator:
  enabled: true
  externalApplicationConfig:
    - name: bpdm-postgres-connection-config
    - name: bpdm-keycloak-connection-config

# Bundled Postgres database.
# When enabled, a "<fullname>-postgres-connection-config" Secret is also generated and applied to the
# BPDM applications (via their externalApplicationConfig). That umbrella-managed Secret is also the
# DB user source for this dependency: customUser.existingSecret below points the postgres chart at it
# (instead of an inline password), so a single Secret feeds both the database and the applications.
# Disabling postgres removes that Secret (and the apps must then be configured against an external DB).
postgres:
  enabled: true
  nameOverride: bpdm-postgres
  customUser:
    name: bpdm
    database: bpdm
    # password: optional. When set, that fixed password is used. When left unset, a password is
    #   generated once and preserved across upgrades in the "<fullname>-postgres-connection-config"
    #   Secret (it never lives in these values). Set it to pin a known password instead.
    # password: bpdm
    # The DB user is created from the umbrella-managed connection-config Secret rather than from an
    # inline password. The value is a template so it resolves to the same name the apps reference.
    existingSecret: '{{ include "bpdm.toReleaseName" (list . "bpdm-postgres-connection-config") }}'
    secretKeys:
      name: username
      password: password
      database: database

# Bundled Keycloak.
# When enabled, a "<fullname>-keycloak-connection-config" Secret is also generated and applied to
# the BPDM applications (via their externalApplicationConfig). Its auth-server-url / issuer-uri are
# derived from the values below, so the apps automatically point at this Keycloak. Disabling keycloak
# also removes that Secret (and the apps must then be configured against an external IdP).
keycloak:
  enabled: true
  nameOverride: bpdm-keycloak
  keycloak:
    adminPassword: admin
    production: false
  realm:
    import: true
    existingSecret: bpdm-realm
  service:
    httpPort: 80
  postgres:
    enabled: true
    nameOverride: bpdm-keycloak-postgres
  mariadb:
    enabled: false

tests:
  applicationConfig:
    bpdm:
      client:
        gate:
          provider:
            issuer-uri: http://bpdm-keycloak/realms/BPDM
        pool:
          provider:
            issuer-uri: http://bpdm-keycloak/realms/BPDM
        orchestrator:
          provider:
            issuer-uri: http://bpdm-keycloak/realms/BPDM
  image:
    registry: docker.io
    repository: tractusx/bpdm-system-tester
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
