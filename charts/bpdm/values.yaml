nameOverride: ""
fullnameOverride: ""

clients:
  admin:
    secret: "**********"
  gate:
    secret: "**********"
  pool:
    secret: "**********"
  orchestrator:
    secret: "**********"
  cleaningDummy:
    secret: "**********"
  gateInputConsumer:
    secret: "**********"
  gateInputManager:
    secret: "**********"
  gateOutputConsumer:
    secret: "**********"
  participant:
    secret: "**********"
  sharingMember:
    secret: "**********"
  taskCreator:
    secret: "**********"
  refinerClean:
    secret: "**********"
  refinerCleanAndSync:
    secret: "**********"
  refinerPoolSync:
    secret: "**********"

bpdm-gate:
  enabled: true
  externalApplicationConfig:
    - name: bpdm-postgres-connection-config
    - name: bpdm-keycloak-connection-config

bpdm-pool:
  enabled: true
  externalApplicationConfig:
    - name: bpdm-postgres-connection-config
    - name: bpdm-keycloak-connection-config

bpdm-cleaning-service-dummy:
  enabled: true
  externalApplicationConfig:
    - name: bpdm-keycloak-connection-config

bpdm-orchestrator:
  enabled: true
  externalApplicationConfig:
    - name: bpdm-postgres-connection-config
    - name: bpdm-keycloak-connection-config

# Bundled Postgres database.
# When enabled, a "<fullname>-postgres-connection-config" ConfigMap is also generated and applied
# to the BPDM applications (via their externalApplicationConfig). Its datasource host is derived
# from the values below, so the apps automatically point at this Postgres. Disabling postgres also
# removes that ConfigMap (and the apps must then be configured against an external database).
postgres:
  enabled: true
  nameOverride: bpdm-postgres
  customUser:
    database: bpdm
    name: bpdm
    # Change this password for production
    password: bpdm

# Bundled Keycloak.
# When enabled, a "<fullname>-keycloak-connection-config" ConfigMap is also generated and applied
# to the BPDM applications (via their externalApplicationConfig). Its auth-server-url / issuer-uri
# are derived from the values below, so the apps automatically point at this Keycloak. Disabling
# keycloak also removes that ConfigMap (and the apps must then be configured against an external IdP).
keycloak:
  enabled: true
  nameOverride: bpdm-keycloak
  keycloak:
    adminPassword: admin
    production: false
  realm:
    import: true
    existingSecret: bpdm-realm
  service:
    httpPort: 80
  postgres:
    enabled: true
    nameOverride: bpdm-keycloak-postgres
  mariadb:
    enabled: false

tests:
  applicationConfig:
    bpdm:
      client:
        gate:
          provider:
            issuer-uri: http://bpdm-keycloak/realms/BPDM
        pool:
          provider:
            issuer-uri: http://bpdm-keycloak/realms/BPDM
        orchestrator:
          provider:
            issuer-uri: http://bpdm-keycloak/realms/BPDM
  image:
    registry: docker.io
    repository: tractusx/bpdm-system-tester
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
