# Provides base-urls for outbound BPDM client connections so that Gate, Pool,
# and Cleaning Service Dummy can reach each other in-cluster - and so the
# system-tester test hook can reach Gate, Pool, and Orchestrator. The URLs are
# derived from the dependency service names (computed the same way Kubernetes
# resolves them) so they are always consistent with the deployed services.
# Mounted by the BPDM applications (and the test pod) via their
# externalApplicationConfig; the authentication credentials for each client are
# kept in the per-service Keycloak config Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bpdm.clientUrlConfig.name" . }}
  labels:
    {{- include "bpdm.labels" . | nindent 4 }}
type: Opaque
stringData:
  application.yml: |-
    bpdm:
      client:
        orchestrator:
          base-url: {{ include "bpdm.orchestratorUrl" . | quote }}
        pool:
          base-url: {{ include "bpdm.poolUrl" . | quote }}
        gate:
          base-url: {{ include "bpdm.gateUrl" . | quote }}
