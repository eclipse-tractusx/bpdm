            provider: "test-keycloak"
            authorization-grant-type: "client_credentials"
            client-id: "BPDM_REFINER_CLEAN_AND_SYNC"
            client-secret: "**********"
          refiner-clean:
            provider: "test-keycloak"
            authorization-grant-type: "client_credentials"
            client-id: "BPDM_REFINER_CLEAN"
