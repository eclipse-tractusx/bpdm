name: 'Perform Trivy Scan on All Apps'
on:
  workflow_dispatch:
  workflow_call:
jobs:
  scan-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [pool, gate, orchestrator, cleaning-service-dummy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Download App Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.1
        with:
          name: bpdm-${{ matrix.app }}-docker
          path: /tmp

      - name: Load App Image
        run: |
          docker load --input /tmp/bpdm-${{ matrix.app }}.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
        with:
          image-ref: "bpdm-${{ matrix.app }}:test"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          timeout: 15m
          vuln-type: library
